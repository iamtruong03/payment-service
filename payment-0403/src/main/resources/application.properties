spring.application.name=payment-0403

# =============================================
# Server
# =============================================
server.port=8080

# =============================================
# Stripe Configuration
# =============================================
# Test Key — thay bằng key thật từ https://dashboard.stripe.com/apikeys
stripe.secret-key=sk_test_..._PUT_YOUR_SECRET_KEY_HERE
stripe.publishable-key=pk_test_..._PUT_YOUR_PUBLISHABLE_KEY_HERE
# Webhook Secret — lấy từ Stripe Dashboard > Webhooks > Signing secret
stripe.webhook-secret=whsec_..._PUT_YOUR_WEBHOOK_SECRET_HERE

# =============================================
# PostgreSQL Database
# =============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/payment_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# Redis Configuration
# =============================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
# spring.data.redis.password=your_redis_password

# =============================================
# CORS & Static Resources
# =============================================
spring.web.resources.static-locations=classpath:/static/

# =============================================
# Rate Limiting Rules (in seconds)
# =============================================
# Tối đa 10 requests / phút / IP cho payment APIs
rate-limit.payment.max-requests=10
rate-limit.payment.window-seconds=60
# Tối đa 5 payment attempts / phút / IP
rate-limit.attempts.max-per-minute=5
# Tối đa 3 thẻ khác nhau / user / giờ
rate-limit.cards.max-per-hour=3
# Sau 5 lần decline liên tiếp → block 1 giờ
rate-limit.decline.max-consecutive=5
rate-limit.decline.block-seconds=3600

# =============================================
# Logging
# =============================================
logging.level.com.example.payment0403=INFO
logging.level.org.springframework.web=WARN
